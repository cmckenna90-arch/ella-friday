[build]
  publish = "."
  functions = "netlify/functions"

[functions."*"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.anthropic.com https://*.netlify.app; img-src 'self' data:; font-src 'self' data:;"
